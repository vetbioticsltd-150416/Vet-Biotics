name: vet_biotics_app_admin
description: Admin application for Vet Biotics veterinary clinic management system
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  vet_biotics_core:
    path: ../core
  vet_biotics_shared:
    path: ../shared
  vet_biotics_auth:
    path: ../auth
  vet_biotics_router:
    path: ../router

  # State management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Navigation
  go_router: ^12.1.3

  # UI
  cached_network_image: ^3.4.0
  octo_image: ^2.1.0
  flutter_svg: ^2.0.9

  # Date/Time
  persian_datetime_picker: ^2.7.0
  intl: ^0.20.2

  # Forms
  form_field_validator: ^1.1.0

  # Charts and Analytics
  fl_chart: ^0.66.1

  # PDF and Printing (temporarily removed due to Firebase conflicts)
  # pdf: ^3.10.7
  # printing: ^5.12.0

  # Search
  flutter_typeahead: ^5.0.2

  # Local storage
  shared_preferences: ^2.2.2

  # Permissions
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700

scripts:
  format: dart format .
  format:fix: dart format --fix .
  fix: dart fix --apply
  analyze: flutter analyze
  test: flutter test
