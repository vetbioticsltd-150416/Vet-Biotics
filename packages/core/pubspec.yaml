name: vet_biotics_core
description: Core business logic and domain layer for Vet Biotics monorepo
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared package
  vet_biotics_shared:
    path: ../shared

  # State management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1

  # Dependency injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.2.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  rxdart: ^0.28.0

  # Date/Time
  persian_datetime_picker: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  injectable_generator: ^2.4.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.4
  bloc_test: ^9.1.6

flutter:
  uses-material-design: true

  # Generate files
  generate: true

scripts:
  format: dart format .
  format:fix: dart format --fix .
  fix: dart fix --apply
  analyze: flutter analyze
  test: flutter test
