name: vet_biotics_router
description: Navigation and routing utilities for Vet Biotics monorepo
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  vet_biotics_shared:
    path: ../shared
  vet_biotics_core:
    path: ../core

  # Navigation
  go_router: ^12.1.3

  # State management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1

  # Utilities
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

scripts:
  format: dart format .
  format:fix: dart format --fix .
  fix: dart fix --apply
  analyze: flutter analyze
  test: flutter test
